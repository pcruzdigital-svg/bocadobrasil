<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boca do Brasil | Haz tu pedido</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --text: #171a21;
      --muted: #6c7484;
      --line: #e7e9ee;
      --brand: #ff7a00;
      --wa: #25d366;
      --wa-dark: #1fb95a;
      --radius-xl: 22px;
      --radius-lg: 16px;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 500px at 95% -10%, #ffe8d1 0%, transparent 45%),
        linear-gradient(180deg, #fafafa 0%, var(--bg) 100%);
      min-height: 100vh;
      padding-bottom: 104px;
    }

    .container {
      width: min(1120px, 92%);
      margin-inline: auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(250, 250, 250, 0.88);
      backdrop-filter: blur(9px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .topbar-content {
      padding: 15px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand {
      font-size: clamp(1.15rem, 4.8vw, 1.5rem);
      font-weight: 800;
      letter-spacing: .2px;
    }

    .brand-sub {
      color: var(--muted);
      font-weight: 600;
      font-size: .95rem;
    }

    .hero {
      margin-top: 18px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 20px;
      display: grid;
      gap: 12px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff4e8;
      color: #9a5100;
      border: 1px solid #ffd8b4;
      font-size: .82rem;
      font-weight: 700;
    }

    .hero h1 {
      font-size: clamp(1.35rem, 5.5vw, 2rem);
      line-height: 1.15;
    }

    .hero p {
      color: var(--muted);
      line-height: 1.45;
      max-width: 60ch;
    }

    .cards {
      margin-top: 18px;
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .2s ease, box-shadow .2s ease;
      display: grid;
      grid-template-rows: 180px auto;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 34px rgba(15, 23, 42, .11);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-body {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
    }

    .name { font-size: 1.02rem; font-weight: 800; }
    .price { color: #0c8a40; font-weight: 800; white-space: nowrap; }
    .desc { color: var(--muted); font-size: .89rem; line-height: 1.35; }

    .qty {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 5px;
      border-radius: 999px;
      background: #f0f3f8;
    }

    .qty button {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 999px;
      background: #fff;
      color: #1f2735;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 2px 7px rgba(0, 0, 0, .09);
      transition: transform .12s ease, background .2s ease;
    }

    .qty button:hover { background: #edf2f8; }
    .qty button:active { transform: scale(.9); }

    .qty span {
      min-width: 28px;
      text-align: center;
      font-weight: 800;
      transition: transform .16s ease;
    }

    .qty span.bump { transform: scale(1.2); }

    .sticky {
      position: fixed;
      inset-inline: 0;
      bottom: 0;
      z-index: 40;
      border-top: 1px solid rgba(0, 0, 0, .06);
      background: rgba(243, 244, 246, .9);
      backdrop-filter: blur(8px);
      padding: 11px 14px calc(11px + env(safe-area-inset-bottom));
    }

    .cta {
      width: min(1120px, 100%);
      margin-inline: auto;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, #2be16f, var(--wa));
      color: #fff;
      font-weight: 800;
      font-size: 1rem;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(37, 211, 102, 0.33);
      transition: transform .15s ease, filter .2s ease;
    }

    .cta:hover { filter: brightness(.98); }
    .cta:active { transform: translateY(2px); }

    .cta:disabled {
      background: #b8c0ce;
      box-shadow: none;
      cursor: not-allowed;
    }

    .badge-count {
      background: rgba(255, 255, 255, .2);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: .92rem;
      min-width: 30px;
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 86px;
      transform: translateX(-50%) translateY(16px);
      background: #1e2430;
      color: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: .9rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 50;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 720px) {
      .hero { grid-template-columns: 1.4fr .6fr; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .hero-emoji { justify-self: end; font-size: 4rem; }
    }

    @media (min-width: 1020px) {
      .cards { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-content">
      <div class="brand">Boca do Brasil</div>
      <div class="brand-sub">Haz tu pedido</div>
    </div>
  </header>

  <main class="container">
    <section class="hero" aria-label="Presentación">
      <div>
        <span class="pill">⭐ Cocina brasileña auténtica</span>
        <h1>Haz tu pedido en segundos</h1>
        <p>Elige tus platos favoritos, ajusta cantidades y envía tu pedido directo a WhatsApp. Rápido, elegante e intuitivo.</p>
      </div>
      <div class="hero-emoji" aria-hidden="true">🍽️</div>
    </section>

    <section class="cards" id="cards" aria-label="Productos"></section>
  </main>

  <div class="sticky">
    <button id="sendBtn" class="cta" type="button">
      Enviar pedido por WhatsApp
      <span class="badge-count" id="count">0</span>
    </button>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const PHONE = "346611878234";

    const items = [
      {
        id: "coxinha",
        nombre: "Coxinha",
        precio: 2.8,
        descripcion: "Crujiente por fuera y rellena de pollo cremoso.",
        imagen: "https://images.unsplash.com/photo-1625944234511-df8f3dcbf2f0?auto=format&fit=crop&w=1200&q=80"
      },
      {
        id: "pao-queijo",
        nombre: "Pão de queijo",
        precio: 1.9,
        descripcion: "Bocados de queso ligeros, dorados y irresistibles.",
        imagen: "https://images.unsplash.com/photo-1604908176997-43134db95f6d?auto=format&fit=crop&w=1200&q=80"
      },
      {
        id: "brigadeiro",
        nombre: "Brigadeiro",
        precio: 1.5,
        descripcion: "Dulce clásico de chocolate con textura cremosa.",
        imagen: "https://images.unsplash.com/photo-1599785209707-a7a4f0e4ff6d?auto=format&fit=crop&w=1200&q=80"
      },
      {
        id: "acai",
        nombre: "Açaí bowl",
        precio: 6.9,
        descripcion: "Açaí frío con fruta fresca y granola premium.",
        imagen: "https://images.unsplash.com/photo-1498837167922-ddd27525d352?auto=format&fit=crop&w=1200&q=80"
      },
      {
        id: "feijoada",
        nombre: "Feijoada",
        precio: 12.5,
        descripcion: "Plato brasileño tradicional con arroz y guarniciones.",
        imagen: "https://images.unsplash.com/photo-1627308595171-d1b5d1981b1c?auto=format&fit=crop&w=1200&q=80"
      },
      {
        id: "guarana",
        nombre: "Guaraná",
        precio: 2.2,
        descripcion: "Refresco brasileño frío y muy refrescante.",
        imagen: "https://images.unsplash.com/photo-1613478223719-2ab802602423?auto=format&fit=crop&w=1200&q=80"
      }
    ];

    const cantidades = Object.fromEntries(items.map((p) => [p.id, 0]));

    const cardsEl = document.getElementById("cards");
    const sendBtn = document.getElementById("sendBtn");
    const countEl = document.getElementById("count");
    const toastEl = document.getElementById("toast");

    const money = new Intl.NumberFormat("es-ES", { style: "currency", currency: "EUR" });

    function showToast(texto) {
      toastEl.textContent = texto;
      toastEl.classList.add("show");
      clearTimeout(showToast.t);
      showToast.t = setTimeout(() => toastEl.classList.remove("show"), 1700);
    }

    function render() {
      cardsEl.innerHTML = items.map((p) => `
        <article class="card" data-id="${p.id}">
          <img src="${p.imagen}" alt="${p.nombre}" loading="lazy" />
          <div class="card-body">
            <div class="row">
              <h2 class="name">${p.nombre}</h2>
              <div class="price">${money.format(p.precio)}</div>
            </div>
            <p class="desc">${p.descripcion}</p>
            <div class="qty" role="group" aria-label="Cantidad de ${p.nombre}">
              <button type="button" data-action="minus" data-id="${p.id}" aria-label="Reducir ${p.nombre}">−</button>
              <span id="qty-${p.id}">0</span>
              <button type="button" data-action="plus" data-id="${p.id}" aria-label="Aumentar ${p.nombre}">+</button>
            </div>
          </div>
        </article>
      `).join("");
    }

    function updateButtonState() {
      const total = Object.values(cantidades).reduce((acc, v) => acc + v, 0);
      countEl.textContent = String(total);
      sendBtn.disabled = total === 0;
    }

    function pulseQty(id) {
      const target = document.getElementById(`qty-${id}`);
      if (!target) return;
      target.classList.remove("bump");
      requestAnimationFrame(() => {
        target.classList.add("bump");
        setTimeout(() => target.classList.remove("bump"), 150);
      });
    }

    function changeQty(id, delta) {
      const next = Math.max(0, (cantidades[id] || 0) + delta);
      if (next === cantidades[id]) return;
      cantidades[id] = next;
      const el = document.getElementById(`qty-${id}`);
      if (el) el.textContent = String(next);
      pulseQty(id);
      updateButtonState();
    }

    function buildMessage() {
      const seleccionados = items.filter((p) => cantidades[p.id] > 0);
      if (!seleccionados.length) return "";

      const listado = seleccionados.map((p) => `${p.nombre} x${cantidades[p.id]}`).join("\n");
      return `Hola, quiero pedir:\n\n${listado}`;
    }

    cardsEl.addEventListener("click", (event) => {
      const btn = event.target.closest("button[data-action]");
      if (!btn) return;

      const { id, action } = btn.dataset;
      changeQty(id, action === "plus" ? 1 : -1);
    });

    sendBtn.addEventListener("click", () => {
      const mensaje = buildMessage();
      if (!mensaje) {
        showToast("Selecciona al menos un producto.");
        sendBtn.animate(
          [
            { transform: "translateX(0)" },
            { transform: "translateX(-6px)" },
            { transform: "translateX(6px)" },
            { transform: "translateX(0)" }
          ],
          { duration: 220, easing: "ease" }
        );
        return;
      }

      const url = `https://wa.me/${PHONE}?text=${encodeURIComponent(mensaje)}`;
      window.open(url, "_blank", "noopener");
    });

    render();
    updateButtonState();
  </script>
</body>
</html>
